<!DOCTYPE html>
<html>
<head>
<title>Upload Materials</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h2>Upload Study Material</h2>

<input type="text" id="subject" placeholder="Subject Name">

<select id="type" onchange="toggleInput()">
<option value="PDF">PDF</option>
<option value="Image">Image</option>
<option value="Video">Video</option>
<option value="Link">Link</option>
</select>

<input type="file" id="file">

<input type="text" id="link" placeholder="Or paste link" style="display:none;">

<button onclick="uploadMaterial()">Upload</button>

</div>

<script src="script.js"></script>

</body>
</html>
